{{- if eq .Values.workload.kind "CronJob" }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "junyi-predictor.fullname" . }}
  labels:
    {{- include "junyi-predictor.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.workload.schedule | quote }}
  concurrencyPolicy: {{ .Values.workload.concurrencyPolicy }}
  successfulJobsHistoryLimit: {{ .Values.workload.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.workload.failedJobsHistoryLimit }}
  jobTemplate:
    spec:
      backoffLimit: {{ .Values.workload.backoffLimit }}
      ttlSecondsAfterFinished: {{ .Values.workload.ttlSecondsAfterFinished }}
      template:
        metadata:
          labels:
            {{- include "junyi-predictor.labels" . | nindent 12 }}
            {{- with .Values.podLabels }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.podAnnotations }}
          annotations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        spec:
          serviceAccountName: {{ include "junyi-predictor.serviceAccountName" . }}
          restartPolicy: {{ .Values.workload.restartPolicy }}
          {{- with .Values.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          containers:
            - name: {{ include "junyi-predictor.name" . }}
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              command:
                {{- toYaml .Values.workload.command | nindent 16 }}
              args:
                {{- toYaml .Values.workload.args | nindent 16 }}
              env:
                {{- range $name, $value := .Values.env }}
                - name: {{ $name }}
                  value: {{ $value | quote }}
                {{- end }}
                {{- range $name, $config := .Values.secretEnv }}
                {{- if $config.enabled }}
                - name: {{ $name }}
                  valueFrom:
                    secretKeyRef:
                      name: {{ $config.secretName }}
                      key: {{ $config.secretKey }}
                {{- end }}
                {{- end }}
              {{- with .Values.envFromSecrets }}
              envFrom:
                {{- range . }}
                - secretRef:
                    name: {{ . }}
                {{- end }}
              {{- end }}
              resources:
                {{- toYaml .Values.resources | nindent 16 }}
          {{- with .Values.nodeSelector }}
          nodeSelector:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.affinity }}
          affinity:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.tolerations }}
          tolerations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
{{- end }}
